<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍅 番茄钟</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 标题栏（可拖拽） -->
  <div id="title-bar">
    <span id="drag-handle">Pomodoro</span>
    <div id="title-buttons">
      <button id="btn-pin" title="置顶">◆</button>
      <button id="btn-min" title="最小化">─</button>
      <button id="btn-close" title="关闭到托盘">✕</button>
    </div>
  </div>

  <!-- 主内容区 -->
  <div id="container">
    <!-- 状态标签 -->
    <div id="status-label">准备开始</div>

    <!-- 圆形进度环 -->
    <div id="timer-ring-wrapper">
      <svg id="timer-ring" viewBox="0 0 200 200">
        <defs>
          <!-- 工作模式渐变 -->
          <linearGradient id="ring-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#d4684b"/>
            <stop offset="50%" stop-color="#c4a55c"/>
            <stop offset="100%" stop-color="#d4684b"/>
          </linearGradient>
          <!-- 休息模式渐变 -->
          <linearGradient id="ring-gradient-break" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7d9b6f"/>
            <stop offset="50%" stop-color="#a8c99a"/>
            <stop offset="100%" stop-color="#7d9b6f"/>
          </linearGradient>

          <!-- 刻度裁剪路径（限制在 87–93 半径环带内） -->
          <clipPath id="tick-clip">
            <path d="M 100 7 A 93 93 0 1 1 7 100 A 93 93 0 0 1 100 7 Z
                     M 100 13 A 87 87 0 1 0 187 100 A 87 87 0 0 0 100 13 Z"
                  fill-rule="evenodd"/>
          </clipPath>
        </defs>

        <!-- 背景轨道 -->
        <circle id="ring-bg"
                cx="100" cy="100" r="90"
                fill="none"
                stroke="rgba(255,255,255,0.05)"
                stroke-width="2.5"/>

        <!-- 分钟刻度（60条） — 周长≈565.49，每刻度≈9.42；线长2 间距7.42 -->
        <circle id="tick-marks-minor"
                cx="100" cy="100" r="90"
                fill="none"
                stroke="rgba(255,255,255,0.18)"
                stroke-width="0.8"
                stroke-dasharray="1.5 7.92"
                transform="rotate(-90 100 100)"/>

        <!-- 5分钟刻度（12条） — 周长≈565.49，每刻度≈47.12；线长4 间距43.12 -->
        <circle id="tick-marks-major"
                cx="100" cy="100" r="90"
                fill="none"
                stroke="rgba(255,255,255,0.28)"
                stroke-width="1.2"
                stroke-dasharray="3 44.12"
                transform="rotate(-90 100 100)"/>

        <!-- 进度弧 -->
        <circle id="ring-progress"
                cx="100" cy="100" r="90"
                fill="none"
                stroke="url(#ring-gradient)"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-dasharray="565.49"
                stroke-dashoffset="0"
                transform="rotate(-90 100 100)"/>
      </svg>
      <!-- 时间显示 -->
      <div id="time-display">25:00</div>
    </div>

    <!-- 番茄计数 -->
    <div id="pomodoro-count"></div>

    <!-- 进度条 -->
    <div id="progress-bar-container">
      <div id="progress-bar"></div>
    </div>

    <!-- 控制按钮 -->
    <div id="controls">
      <button id="btn-reset" class="ctrl-btn" title="重置 (R)">↺</button>
      <button id="btn-start" class="ctrl-btn primary" title="开始 (空格)">▶</button>
      <button id="btn-skip" class="ctrl-btn" title="跳过 (S)">⏭</button>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
